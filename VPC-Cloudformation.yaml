AWSTemplateFormatVersion: "2010-09-09"
Description: VPC com subnet publica e privada

Parameters:
  VpcCidr:
    Type: String
    Default: 10.0.0.0/16

  PublicSubnetCidr:
    Type: String
    Default: 10.0.1.0/24

  PrivateSubnetCidr:
    Type: String
    Default: 10.0.2.0/24

Resources:

# =========================
# VPC
# =========================

  VpcCloudFormation:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: !Ref VpcCidr
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: vpc-cloudformation

# =========================
# INTERNET GATEWAY
# =========================

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: igw-cloudformation

  AttachInternetGateway:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref VpcCloudFormation
      InternetGatewayId: !Ref InternetGateway

# =========================
# SUBNET PUBLICA
# =========================

  PublicSubnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VpcCloudFormation
      CidrBlock: !Ref PublicSubnetCidr
      AvailabilityZone: !Select [0, !GetAZs ""]
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: subnet-public-cloudformation

# =========================
# SUBNET PRIVADA
# =========================

  PrivateSubnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VpcCloudFormation
      CidrBlock: !Ref PrivateSubnetCidr
      AvailabilityZone: !Select [1, !GetAZs ""]
      MapPublicIpOnLaunch: false
      Tags:
        - Key: Name
          Value: subnet-private-cloudformation

# =========================
# ROUTE TABLE PUBLICA
# =========================

  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VpcCloudFormation
      Tags:
        - Key: Name
          Value: rt-public-cloudformation

  PublicDefaultRoute:
    Type: AWS::EC2::Route
    DependsOn: AttachInternetGateway
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

# =========================
# ROUTE TABLE PRIVADA
# =========================

  PrivateRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VpcCloudFormation
      Tags:
        - Key: Name
          Value: rt-private-cloudformation

# =========================
# ASSOCIACOES
# =========================

  PublicSubnetRouteAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet
      RouteTableId: !Ref PublicRouteTable

  PrivateSubnetRouteAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateSubnet
      RouteTableId: !Ref PrivateRouteTable

# =========================
# OUTPUTS
# =========================

Outputs:

  VpcId:
    Description: ID da VPC
    Value: !Ref VpcCloudFormation

  PublicSubnetId:
    Description: ID da subnet publica
    Value: !Ref PublicSubnet

  PrivateSubnetId:
    Description: ID da subnet privada
    Value: !Ref PrivateSubnet